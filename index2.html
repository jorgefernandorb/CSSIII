<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exemplo Menu Display None</title>
    <link rel="stylesheet" href="estilo3.css">
</head>
<body>
    <div class="menu-container">
        <button class="botao-menu">☰ Menu Categorias</button>       
        <nav class="lista-links">
            <a href="#">Eletrônicos</a>
            <a href="#">Moda</a>
            <a href="#">Casa e Decoração</a>
            <a href="#">Promoções</a>
        </nav>
    </div>
    <p>Passe o mouse sobre o botão acima para revelar o menu.</p>
    <div class="container">
        <div class="card item-especial">Especial (Order -1)</div>
        <div class="card">Card 1</div>
        <div class="card">Card 2</div>
        <div class="card">Card 3</div>
    </div>
    <div class="caixa-viva"></div>
    <p style="text-align: center;">Esta caixa está animada com @keyframes!</p>
</body>
</html>
